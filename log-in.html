<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="queries.css">
</head>
<body>
    <div class="sign-up-container">
        <div class="imm-container">
        <form class="sign-up-form" action="nikeduplicate-server" method="post">
            <h1 class="sign-up-h1">Log into your Nike account</h1>

            <label class="sign-up-label" for="email">Email</label>
            <input class="content-border" id="email" type="email" name="email" required>
            
            <label class="sign-up-label" for="password">Password</label>
            <input class="content-border" id="password" type="password" name="password">
        
            <button class="btn create-button">Log in</button>
            <div class="log-in-flex">
                <a href="forgot-password.html">Forgotten password?</a>
                <a href="sign-up.html">Create account</a>
            </div>
        </form>
        </div>

    </div>
    
</body>
</html>
